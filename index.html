<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/reset.css">
    <title>Toxin</title>
</head>
<body>

    <div class="like-btn">
        <span class="elem__title">like button</span>
        <label for="like">
            <input type="checkbox" name="likes" id="like" checked>
            <span class="like-btn__true">2</span>
        </label>
    </div>

    <div class="radio-toggle">
        <span class="elem__title">Toggle</span>
        <label for="true">
            <input type="checkbox" name="toggle" id="true" >
            <span class="radio-toggle__btn">Получать спецпредложения</span>
        </label>
    </div>

    <section class="input">
        <span class="span-otsyp">dropdown</span>
        <label for="email" class="input-box">
            <span class="subtitle">Text Field</span>
            <input type="email" name="" id="email" class="input-box__input" placeholder="Email">
        </label>
    </section>

    <!-- .dropdown -->
    <div class="dropdown input" >
        <span class="span-otsyp">dropdown</span>
        <label for="check" class="input-box dropdown__input">
            <input type="text" class="input-box__input ">
            <span class="dropdown__arrow"></span>
        </label>
        <input type="checkbox" id="check" class="input-box__checkbox">
        <div class="dropdown__box">
            <div class="dropdown__box-item">
                <span class="dropdown__box-item__text">спальни</span>
                <div class="dropdown__calc">
                    <button class="dropdown__calc-btn">-</button>
                    <span class="dropdown__calc-sum">0</span>
                    <button class="dropdown__calc-btn">+</button>
                </div>
            </div>
            <div class="dropdown__box-item">
                <span class="dropdown__box-item__text">кровати</span>
                <div class="dropdown__calc">
                    <button class="dropdown__calc-btn">-</button>
                    <span class="dropdown__calc-sum">0</span>
                    <button class="dropdown__calc-btn">+</button>
                </div>
            </div>
            <div class="dropdown__box-item">
                <span class="dropdown__box-item__text">ванные комнаты</span>
                <div class="dropdown__calc">
                    <button class="dropdown__calc-btn">-</button>
                    <span class="dropdown__calc-sum">0</span>
                    <button class="dropdown__calc-btn">+</button>
                </div>
            </div>
        </div>
    </div>
    <!-- /.dropdown -->

    <div class="drop-list input">
        <input type="checkbox" name="drop-list" id="id" checked>
        <label for="id">
            <span class="drop-list__arrow">expandable checkbox list</span>
        </label>
        <div class="drop-list__box">
            <div class="drop-list__box-item">
                <label for="1">
                    <input type="checkbox" name="box-check" id="1">
                    <span class="drop-list__box-item__checkbox">Стол</span>
                </label>
            </div>
            <div class="drop-list__box-item">
                <label for="2">
                    <input type="checkbox" name="box-check" id="2">
                    <span class="drop-list__box-item__checkbox">Письменный стол</span>
                </label>
            <div class="drop-list__box-item">
                <label for="3">
                    <input type="checkbox" name="box-check" id="3">
                    <span class="drop-list__box-item__checkbox">Стул для кормления</span>
                </label>
            </div>
            <div class="drop-list__box-item">
                <label for="4">
                    <input type="checkbox" name="box-check" id="4">
                    <span class="drop-list__box-item__checkbox">Кроватка</span>
                </label>
            </div>
            <div class="drop-list__box-item">
                <label for="5">
                    <input type="checkbox" name="box-check" id="5">
                    <span class="drop-list__box-item__checkbox">Телевизор</span>
                </label>
            </div>
            <div class="drop-list__box-item">
                <label for="6">
                    <input type="checkbox" name="box-check" id="6">
                    <span class="drop-list__box-item__checkbox">Шампунь</span>
                </label>
            </div>
        </div>
    </div>

    <div class="checkbox-btn">
        <span class="elem__title">Checkbox Buttons</span>
        <div class="drop-list__box-item">
            <label for="11">
                <input type="checkbox" name="box-check1" id="11">
                <span class="drop-list__box-item__checkbox">Можно курить</span>
            </label>
        </div>
        <div class="drop-list__box-item">
            <label for="21">
                <input type="checkbox" name="box-check1" id="21">
                <span class="drop-list__box-item__checkbox">Можно с питомцами</span>
            </label>
        <div class="drop-list__box-item">
            <label for="31">
                <input type="checkbox" name="box-check1" id="31">
                <span class="drop-list__box-item__checkbox">Можно пригласить гостей (до 10 человек)</span>
            </label>
        </div>
    </div>

    <div class="checkbox-btn">
        <span class="elem__title">rich Checkbox Buttons</span>
        <div class="drop-list__box-item">
            <label for="112">
                <input type="checkbox" name="box-check1" id="112">
                <span class="drop-list__box-item__checkbox"><span class="drop-list__title">Широкий коридор</span>Ширина коридоров в номере не менее 91 см.</span>
            </label>
        </div>
        <div class="drop-list__box-item">
            <label for="212">
                <input type="checkbox" name="box-check1" id="212">
                <span class="drop-list__box-item__checkbox"><span class="drop-list__title">Помощник для инвалидов</span>На 1 этаже вас встретит специалист  и проводит до номера.</span>
            </label>
        </div>
    </div>

    <div class="radio-btn">
        <span class="elem__title">Radio Buttons</span>
        <label for="men">
            <input type="radio" name="gender" id="men" checked>
            <span class="radio-btn__gender">Мужчина</span>
        </label>
        <label for="woman">
            <input type="radio" name="gender" id="woman">
            <span class="radio-btn__gender">Женщина</span>
        </label>
    </div>

    <div class="bullet-list">
        <span class="elem__title">bullet list</span>
        <ul class="bullet-list__list">
            <li class="bullet-list__item">Нельзя с питомцами</li>
            <li class="bullet-list__item">Без вечеринок и мероприятий</li>
            <li class="bullet-list__item">Время прибытия — после 13:00,
                а выезд до 12:00</li>
        </ul>
    </div>
  
    
</body>
</html>
